name: Automated Preprocessing Pipeline

on:
  push:
    branches: [main, master]
    paths:
      - "dataset_raw/**"
      - "preprocessing/automate_RiecoEdward.py"
      - "requirements.txt"
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  preprocessing:
    name: Run Preprocessing Pipeline
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout Repository
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          lfs: true

      # 2. Setup Python
      - name: Set up Python 3.12.7
        uses: actions/setup-python@v5
        with:
          python-version: "3.12.7"
          cache: "pip"

      # 3. Install Dependencies from requirements.txt
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Optional: Debug Installed Packages
      - name: Verify Installed Packages
        run: |
          python --version
          pip list
          python -c "import pandas, sklearn, joblib, requests; print('All core dependencies loaded successfully')"

      # 4. Run Preprocessing
      - name: Run Preprocessing Script
        working-directory: preprocessing
        run: |
          python automate_RiecoEdward.py \
            --raw ../dataset_raw/heart.csv \
            --out_dir dataset_preprocessing

      # 5. Verify Output Files
      - name: Verify Output
        run: |
          echo "=== Output files ==="
          ls -lh preprocessing/dataset_preprocessing/

          echo ""
          echo "=== Dataset Shapes ==="
          python - <<EOF
          import pandas as pd

          train = pd.read_csv('preprocessing/dataset_preprocessing/train.csv')
          val   = pd.read_csv('preprocessing/dataset_preprocessing/val.csv')
          test  = pd.read_csv('preprocessing/dataset_preprocessing/test.csv')

          print(f"train : {train.shape}")
          print(f"val   : {val.shape}")
          print(f"test  : {test.shape}")
          print(f"columns ({len(train.columns)}): {list(train.columns)}")
          EOF

      # 6. Upload Preprocessed Dataset
      - name: Upload Preprocessed Dataset
        uses: actions/upload-artifact@v4
        with:
          name: dataset_preprocessing
          path: preprocessing/dataset_preprocessing/
          retention-days: 30

      # 7. Upload Log File
      - name: Upload Preprocessing Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: preprocessing-log
          path: preprocessing/preprocessing.log
          retention-days: 7
